<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nervous System Simulator</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">

                🧠 Nervous System API

            </a>

        </div>

    </nav>

    <!-- Hero Section -->

    <section class="hero text-center">

        <div class="container">

            <h1 class="display-3 fw-bold">

                Human Nervous System Simulator

            </h1>

            <p class="lead">

                DecodeLabs Project 2 - Backend API Development

            </p>

        </div>

    </section>

    <!-- API Buttons -->

    <section class="container mt-5">

        <div class="row g-4">

            <div class="col-md-3">

                <button class="btn btn-primary w-100 py-3"
                    onclick="getOverview()">

                    Overview

                </button>

            </div>

            <div class="col-md-3">

                <button class="btn btn-success w-100 py-3"
                    onclick="getBrain()">

                    Brain

                </button>

            </div>

            <div class="col-md-3">

                <button class="btn btn-warning w-100 py-3"
                    onclick="getNeurons()">

                    Neurons

                </button>

            </div>

            <div class="col-md-3">

                <button class="btn btn-danger w-100 py-3"
                    onclick="getLogs()">

                    Logs

                </button>

            </div>

        </div>

    </section>

    <!-- Stimulus Form -->

    <section class="container mt-5">

        <div class="card shadow-lg p-4">

            <h2 class="text-center mb-4">

                Stimulate Nervous System

            </h2>

            <div class="row">

                <div class="col-md-4">

                    <input
                        type="text"
                        id="stimulus"
                        class="form-control"
                        placeholder="Stimulus">

                </div>

                <div class="col-md-4">

                    <select
                        id="location"
                        class="form-select">

                        <option value="">Select Body Part</option>

                        <option>Hand</option>

                        <option>Foot</option>

                        <option>Eye</option>

                        <option>Ear</option>

                        <option>Skin</option>

                        <option>Nose</option>

                        <option>Tongue</option>

                    </select>

                </div>

                <div class="col-md-2">

                    <input
                        type="number"
                        id="intensity"
                        class="form-control"
                        min="1"
                        max="10"
                        placeholder="1-10">

                </div>

                <div class="col-md-2">

                    <button
                        class="btn btn-dark w-100"
                        onclick="stimulate()">

                        Send

                    </button>

                </div>

            </div>

        </div>

    </section>

        <!-- API Response -->

    <section class="container mt-5 mb-5">

        <div class="card shadow-lg">

            <div class="card-header bg-dark text-white">

                <h3 class="mb-0">

                    API Response

                </h3>

            </div>

            <div class="card-body">

                <pre id="output">

Click any button above to see the API response.

                </pre>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center p-4">

        <div class="container">

            <h5>🧠 Nervous System Simulator</h5>

            <p class="mb-1">
                DecodeLabs Project 2
            </p>

            <p class="mb-0">
                Developed by Abhishek Raut
            </p>

        </div>

    </footer>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
